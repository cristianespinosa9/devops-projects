name: Hello Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  saludar:
    runs-on: ubuntu-latest
    steps:
      - name: Mostrar contexto
        run: |
          echo "Hola desde GitHub Actions"
          echo "Repo: ${{ github.repository }}"
          echo "Rama: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Autor: ${{ github.actor }}"
          echo "Trigger: ${{ github.event_name }}"

      - name: Sistema operativo del runner
        run: |
          uname -a
          cat /etc/os-release

      - name: Programas pre-instalados (tolerante)
        run: |
          set +e   # no abortar si alguno no está
          echo "=== Docker ==="
          docker --version || echo "no instalado"
          echo "=== Node ==="
          node --version || echo "no instalado"
          echo "=== Python ==="
          python3 --version || echo "no instalado"
          echo "=== kubectl ==="
          kubectl version --client || echo "no instalado"
          echo "=== helm ==="
          helm version || echo "no instalado"
          echo "=== gh ==="
          gh --version || echo "no instalado"
          echo "=== aws ==="
          aws --version 2>&1 || echo "no instalado"

  con-terraform:
    name: Con Terraform instalado a propósito
    runs-on: ubuntu-latest
    steps:
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Verificar
        run: terraform version
